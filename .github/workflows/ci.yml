name: task4_flutter_adaptive_app CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  android-web-windows:
    name: Analyze, test, Android, Web and Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Print tool versions
        shell: pwsh
        run: |
          java -version
          flutter --version
          dart --version
          cmake --version
          if (Test-Path ".\android\gradlew.bat") {
            .\android\gradlew.bat --version
          } else {
            Write-Host "android/gradlew.bat not found, skipping Gradle wrapper version check"
          }

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Prepare test results directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path build/test-results

      - name: Unit and widget tests
        shell: pwsh
        run: flutter test --machine > build/test-results/flutter_unit_widget.json

      - name: Integration tests
        shell: pwsh
        run: flutter test integration_test -d windows | Tee-Object -FilePath build/test-results/flutter_integration.log

      - name: Build Android APK
        run: flutter build apk --debug

      - name: Build Web
        run: flutter build web

      - name: Build Windows
        run: flutter build windows

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: task4-flutter-android-apk
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: ignore

      - name: Upload Web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: task4-flutter-web
          path: build/web/**
          if-no-files-found: ignore

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: task4-flutter-windows
          path: build/windows/**/runner/Release/**
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task4-flutter-test-results
          path: build/test-results/**
          if-no-files-found: ignore

  ios:
    name: iOS no-codesign build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Print tool versions
        run: |
          java -version || true
          flutter --version
          dart --version
          xcodebuild -version
          if [ -f "./android/gradlew" ]; then
            ./android/gradlew --version
          else
            echo "android/gradlew not found, skipping Gradle wrapper version check"
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Build iOS without codesign
        run: flutter build ios --no-codesign

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: task4-flutter-ios
          path: build/ios/iphoneos/**
          if-no-files-found: ignore
