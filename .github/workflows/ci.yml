name: task4_flutter_adaptive_app CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  android-web-windows:
    name: Analyze, test, Android, Web and Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Print tool versions
        shell: pwsh
        run: |
          java -version
          flutter --version
          dart --version
          cmake --version
          if (Test-Path ".\android\gradlew.bat") {
            .\android\gradlew.bat --version
          } else {
            Write-Host "android/gradlew.bat not found, skipping Gradle wrapper version check"
          }

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Prepare test results directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path build/test-results

      - name: Unit and widget tests
        shell: pwsh
        run: flutter test --machine > build/test-results/flutter_unit_widget.json

      - name: Integration tests
        shell: pwsh
        run: flutter test integration_test -d windows | Tee-Object -FilePath build/test-results/flutter_integration.log

      - name: Build Android APK
        run: flutter build apk --debug

      - name: Build Web for GitHub Pages
        run: flutter build web --base-href "/lab9-task4-flutter-adaptive-app/"

      - name: Prepare Pages content
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path pages/lab9-task4-flutter-adaptive-app | Out-Null
          Copy-Item -Recurse -Force -Path build/web/* -Destination pages/lab9-task4-flutter-adaptive-app

      - name: Build Windows
        run: flutter build windows

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: task4-flutter-android-apk
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: task4-flutter-web-pages
          path: pages/lab9-task4-flutter-adaptive-app/**
          if-no-files-found: error

      - name: Upload Windows runnable artifact
        uses: actions/upload-artifact@v4
        with:
          name: task4-flutter-windows-runnable
          path: build/windows/**/runner/Release/**
          if-no-files-found: error

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task4-flutter-test-results
          path: build/test-results/**
          if-no-files-found: ignore

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy Pages
        if: github.event_name != 'pull_request'
        uses: actions/deploy-pages@v4

  ios-simulator:
    name: iOS simulator app artifact
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Print tool versions
        run: |
          java -version || true
          flutter --version
          dart --version
          xcodebuild -version
          if [ -f "./android/gradlew" ]; then
            ./android/gradlew --version
          else
            echo "android/gradlew not found, skipping Gradle wrapper version check"
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Build iOS simulator without codesign
        run: flutter build ios --simulator --no-codesign

      - name: Zip iOS simulator app
        run: |
          cd build/ios/iphonesimulator
          zip -r ../Runner-simulator.zip Runner.app

      - name: Optional device no-codesign check
        run: flutter build ios --no-codesign

      - name: Upload iOS simulator app
        uses: actions/upload-artifact@v4
        with:
          name: task4-flutter-ios-simulator-app
          path: build/ios/Runner-simulator.zip
          if-no-files-found: error

      - name: Upload iOS no-codesign check
        uses: actions/upload-artifact@v4
        with:
          name: task4-flutter-ios-device-no-codesign-check
          path: build/ios/iphoneos/**
          if-no-files-found: ignore
